<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>js-openhab-rest-client · Testsuite</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --accent:   #f78166;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --blue:     #58a6ff;
    --purple:   #bc8cff;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 52px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
  }
  header .logo { font-family: var(--mono); font-weight: 700; font-size: 15px; color: var(--accent); }
  header .sub  { font-size: 12px; color: var(--muted); }
  header .conn-form { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  header input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    outline: none;
  }
  header input:focus { border-color: var(--blue); }
  header input[name="url"] { width: 200px; }
  header input[name="user"], header input[name="pass"], header input[name="token"] { width: 120px; }
  .btn {
    background: var(--accent);
    color: #0d1117;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); font-weight: 500; }
  .btn.green  { background: var(--green);  color: #0d1117; }
  .btn.blue   { background: var(--blue);   color: #0d1117; }
  .btn.red    { background: var(--red);    color: #fff; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.ok { background: var(--green); }

  /* ── Sidebar ─────────────────────────────── */
  nav {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .nav-section { padding: 6px 14px 2px; font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: color .12s, background .12s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .nav-item.active { color: var(--text); background: rgba(248,129,105,.07); border-left-color: var(--accent); }
  .nav-item .badge { margin-left: auto; font-size: 10px; font-family: var(--mono); background: var(--border); padding: 1px 5px; border-radius: 3px; }
  .nav-item .badge.pass { background: rgba(63,185,80,.2); color: var(--green); }
  .nav-item .badge.fail { background: rgba(248,81,73,.2); color: var(--red); }

  /* ── Main panel ──────────────────────────── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .panel-title { font-family: var(--mono); font-weight: 700; font-size: 16px; }
  .panel-sub   { font-size: 12px; color: var(--muted); }
  .run-all-btn { margin-left: auto; }

  .test-area {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── Test list (left) ────────────────────── */
  .test-list {
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 10px;
  }

  .test-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .test-card:hover { border-color: var(--muted); }
  .test-card.running { border-color: var(--yellow); }
  .test-card.pass    { border-color: var(--green); }
  .test-card.fail    { border-color: var(--red); }

  .test-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    background: rgba(255,255,255,.02);
  }
  .test-num  { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 28px; }
  .test-name { font-family: var(--mono); font-size: 13px; flex: 1; }
  .test-state { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .test-state.running { background: var(--yellow); animation: pulse .8s infinite; }
  .test-state.pass    { background: var(--green); }
  .test-state.fail    { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .test-params {
    padding: 8px 12px;
    display: none;
    border-top: 1px solid var(--border);
    gap: 6px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .test-params.open { display: flex; }
  .param-group { display: flex; flex-direction: column; gap: 3px; }
  .param-label { font-size: 10px; color: var(--muted); }
  .param-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 5px;
    outline: none;
    min-width: 120px;
  }
  .param-input:focus { border-color: var(--blue); }
  .run-btn { align-self: flex-end; }

  /* ── Output (right) ──────────────────────── */
  .output-panel {
    display: flex; flex-direction: column; overflow: hidden;
  }
  .output-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .output-title { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .clear-btn { margin-left: auto; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
  }

  .log-entry { margin-bottom: 2px; }
  .log-entry.separator { color: var(--border); padding: 4px 0; }
  .log-entry.test-header { color: var(--accent); font-weight: 700; padding-top: 6px; }
  .log-entry.ok   { color: var(--green); }
  .log-entry.err  { color: var(--red); }
  .log-entry.info { color: var(--blue); }
  .log-entry.json { color: var(--text); }
  .log-entry.sse  { color: var(--purple); }
  .log-entry.warn { color: var(--yellow); }
  .log-entry.muted { color: var(--muted); }

  .sse-badge {
    display: inline-block;
    background: rgba(188,140,255,.15);
    border: 1px solid rgba(188,140,255,.3);
    color: var(--purple);
    font-size: 10px;
    padding: 0 5px;
    border-radius: 3px;
    margin-right: 4px;
  }

  .stats-bar {
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 16px; font-size: 11px;
    flex-shrink: 0; color: var(--muted);
  }
  .stats-bar span { display: flex; align-items: center; gap: 4px; }
  .stats-bar .n { font-family: var(--mono); font-weight: 700; }
  .stats-bar .n.green { color: var(--green); }
  .stats-bar .n.red   { color: var(--red); }
  .stats-bar .n.yellow{ color: var(--yellow); }

  /* ── SSE monitor overlay ─────────────────── */
  .sse-monitor {
    position: fixed; bottom: 20px; right: 20px;
    width: 360px; max-height: 300px;
    background: var(--surface);
    border: 1px solid var(--purple);
    border-radius: 10px;
    display: none; flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 100;
  }
  .sse-monitor.open { display: flex; }
  .sse-monitor-head {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .sse-monitor-title { font-family: var(--mono); font-size: 12px; color: var(--purple); font-weight: 700; flex: 1; }
  #sse-log { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.6; }
  .sse-event { color: var(--purple); margin-bottom: 2px; }
  .sse-event .ts { color: var(--muted); margin-right: 6px; }
</style>
</head>
<body>

<!-- ══ HEADER ═══════════════════════════════════════════════════════════════ -->
<header>
  <span class="logo">openHAB JS</span>
  <span class="sub">REST Client Testsuite</span>
  <div class="conn-form">
    <div class="status-dot" id="dot"></div>
    <input name="url"   id="inp-url"   value="http://127.0.0.1:8080" placeholder="URL">
    <input name="user"  id="inp-user"  value="openhab"  placeholder="Username">
    <input name="pass"  id="inp-pass"  value="habopen"  placeholder="Password" type="password">
    <input name="token" id="inp-token" placeholder="…oder Token" type="password">
    <button class="btn" onclick="connect()">Verbinden</button>
  </div>
</header>

<!-- ══ SIDEBAR ══════════════════════════════════════════════════════════════ -->
<nav id="nav"></nav>

<!-- ══ MAIN ═════════════════════════════════════════════════════════════════ -->
<main>
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-title">— Wähle eine Klasse —</div>
      <div class="panel-sub"  id="panel-sub">Verbinde zuerst mit deinem openHAB-Server</div>
    </div>
    <button class="btn green run-all-btn" onclick="runAll()">▶ Alle Tests</button>
  </div>

  <div class="test-area">
    <div class="test-list" id="test-list">
      <div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;">
        Klasse aus der Seitenleiste wählen
      </div>
    </div>
    <div class="output-panel">
      <div class="output-header">
        <span class="output-title" id="log-title">Ausgabe</span>
        <button class="btn secondary clear-btn" onclick="clearLog()">✕ Leeren</button>
      </div>
      <div id="log"></div>
      <div class="stats-bar">
        <span>Tests: <span class="n" id="stat-total">0</span></span>
        <span>✓ <span class="n green" id="stat-pass">0</span></span>
        <span>✗ <span class="n red"   id="stat-fail">0</span></span>
        <span>⏳ <span class="n yellow" id="stat-run">0</span></span>
      </div>
    </div>
  </div>
</main>

<!-- ══ SSE MONITOR ══════════════════════════════════════════════════════════ -->
<div class="sse-monitor" id="sse-monitor">
  <div class="sse-monitor-head">
    <span class="sse-badge">SSE</span>
    <span class="sse-monitor-title" id="sse-monitor-title">Livestream</span>
    <button class="btn secondary" style="padding:2px 8px;font-size:11px;" onclick="stopSSE()">■ Stop</button>
    <button class="btn secondary" style="padding:2px 8px;font-size:11px;margin-left:4px;" onclick="document.getElementById('sse-monitor').classList.remove('open')">✕</button>
  </div>
  <div id="sse-log"></div>
</div>

<!-- ══ OPENHAB LIBRARY (inline) ═════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/gh/Michdo93/js-openhab-rest-client@main/openhab.js"></script>

<!-- ══ TEST ENGINE ══════════════════════════════════════════════════════════ -->
<script>
// ─── State ───────────────────────────────────────────────────────────────────
let client = null;
let currentSection = null;
let stats = { total: 0, pass: 0, fail: 0, running: 0 };
let activeSSE = null;

// ─── Logging ──────────────────────────────────────────────────────────────────
const logEl = document.getElementById("log");

function log(msg, cls = "json") {
  const d = document.createElement("div");
  d.className = "log-entry " + cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function logHeader(name, num) {
  log(`${"─".repeat(4)} Test #${num}: ${name}() ${"─".repeat(Math.max(2, 44 - name.length))}`, "test-header");
}

function logJSON(obj) {
  if (obj === null || obj === undefined) { log("null", "muted"); return; }
  if (typeof obj === "string") { log(obj, "json"); return; }
  try {
    const s = JSON.stringify(obj, null, 2);
    s.split("\n").forEach(l => log(l, "json"));
  } catch { log(String(obj), "json"); }
}

function logOK(msg)   { log("✓ " + msg, "ok"); }
function logERR(msg)  { log("✗ " + msg, "err"); }
function logINFO(msg) { log("ℹ " + msg, "info"); }
function logSSE(msg)  { log("⚡ " + msg, "sse"); }
function logSep()     { log("", "separator"); }
function clearLog()   { logEl.innerHTML = ""; resetStats(); }

function resetStats() { stats = { total: 0, pass: 0, fail: 0, running: 0 }; updateStats(); }
function updateStats() {
  document.getElementById("stat-total").textContent = stats.total;
  document.getElementById("stat-pass").textContent  = stats.pass;
  document.getElementById("stat-fail").textContent  = stats.fail;
  document.getElementById("stat-run").textContent   = stats.running;
}

// ─── Connection ───────────────────────────────────────────────────────────────
async function connect() {
  const url   = document.getElementById("inp-url").value.trim();
  const user  = document.getElementById("inp-user").value.trim();
  const pass  = document.getElementById("inp-pass").value.trim();
  const token = document.getElementById("inp-token").value.trim();

  clearLog();
  logINFO("Verbinde mit " + url + " …");

  try {
    const { OpenHABClient } = openHAB;
    if (token) {
      client = new OpenHABClient(url, null, null, token);
    } else {
      client = new OpenHABClient(url, user || null, pass || null);
    }
    await client.login();
    if (client.isLoggedIn) {
      document.getElementById("dot").classList.add("ok");
      logOK("Verbunden! isCloud=" + client.isCloud);
    } else {
      logERR("Verbindung fehlgeschlagen (kein 200)");
    }
  } catch(e) {
    logERR("Fehler: " + e.message);
  }
}

// ─── Run wrapper ─────────────────────────────────────────────────────────────
async function runTest(cardEl, testFn, label, num) {
  const stateEl = cardEl.querySelector(".test-state");
  const card    = cardEl.closest(".test-card");

  card.className = "test-card running";
  stateEl.className = "test-state running";
  stats.total++; stats.running++;
  updateStats();
  logSep();
  logHeader(label, num);

  let ok = true;
  try {
    await testFn();
  } catch(e) {
    logERR(e.message || String(e));
    ok = false;
  }

  stats.running--;
  if (ok) { stats.pass++; card.className = "test-card pass"; stateEl.className = "test-state pass"; }
  else     { stats.fail++; card.className = "test-card fail"; stateEl.className = "test-state fail"; }

  // update sidebar badge
  const badge = document.querySelector(`.nav-item[data-key="${currentSection}"] .badge`);
  if (badge) {
    badge.textContent = `${stats.pass}/${stats.total}`;
    badge.className = "badge " + (stats.fail > 0 ? "fail" : "pass");
  }

  updateStats();
}

async function runAll() {
  resetStats();
  clearLog();
  const cards = document.querySelectorAll(".test-card");
  for (const card of cards) {
    const runBtn = card.querySelector(".btn.run-btn");
    if (runBtn) runBtn.click();
    await new Promise(r => setTimeout(r, 200));
  }
}

// ─── SSE helpers ─────────────────────────────────────────────────────────────
function stopSSE() {
  if (activeSSE && activeSSE.reader) {
    activeSSE.reader.cancel();
    activeSSE = null;
    logSSE("SSE-Stream gestoppt.");
  }
}

async function watchSSE(promise, label) {
  stopSSE();
  document.getElementById("sse-monitor").classList.add("open");
  document.getElementById("sse-monitor-title").textContent = label;
  const sseLog = document.getElementById("sse-log");
  sseLog.innerHTML = "";

  logSSE("SSE-Stream geöffnet → Monitor rechts unten");
  const resp = await promise;
  const reader = resp.body.getReader();
  const dec    = new TextDecoder();
  activeSSE = { reader };
  let buf = "";

  (async () => {
    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value);
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          const ts = new Date().toLocaleTimeString("de-DE");
          const div = document.createElement("div");
          div.className = "sse-event";
          try {
            const obj = JSON.parse(raw);
            div.innerHTML = `<span class="ts">${ts}</span>${JSON.stringify(obj)}`;
          } catch {
            div.innerHTML = `<span class="ts">${ts}</span>${raw}`;
          }
          sseLog.appendChild(div);
          sseLog.scrollTop = sseLog.scrollHeight;
        }
      }
    } catch { /* stream closed */ }
  })();
}

// ─── Test definitions ────────────────────────────────────────────────────────
// Each section is an object: { title, sub, tests: [{ name, params, fn }] }

const SECTIONS = {};

// ── Items ─────────────────────────────────────────────────────────────────────
SECTIONS["Items"] = {
  title: "Items", sub: "Elemente verwalten",
  tests: [
    { name: "getItems", params: [
        { label: "type",   key: "type",   def: "" },
        { label: "tags",   key: "tags",   def: "" },
        { label: "language", key: "lang", def: "" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.getItems({ type: p.type||null, tags: p.tags||null, language: p.lang||null });
        logOK("getItems → " + (Array.isArray(r) ? r.length + " Items" : JSON.stringify(r)));
        if (Array.isArray(r) && r.length) logJSON(r.slice(0,2));
      }
    },
    { name: "getItem", params: [{ label: "itemName", key: "name", def: "testSwitch" }],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.getItem(p.name);
        logOK("getItem → " + (r.name || JSON.stringify(r)));
        logJSON(r);
      }
    },
    { name: "getItemState", params: [{ label: "itemName", key: "name", def: "testSwitch" }],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.getItemState(p.name);
        logOK("getItemState → " + r);
      }
    },
    { name: "sendCommand", params: [
        { label: "itemName", key: "name", def: "testSwitch" },
        { label: "command",  key: "cmd",  def: "ON" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.sendCommand(p.name, p.cmd);
        logOK("sendCommand " + p.cmd + " → " + JSON.stringify(r));
      }
    },
    { name: "updateItemState", params: [
        { label: "itemName", key: "name",  def: "testNumber" },
        { label: "state",    key: "state", def: "42" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.updateItemState(p.name, p.state);
        logOK("updateItemState → " + JSON.stringify(r));
      }
    },
    { name: "addOrUpdateItem", params: [
        { label: "itemName", key: "name", def: "newSwitch" },
        { label: "type",     key: "type", def: "Switch" },
        { label: "label",    key: "lbl",  def: "New Switch" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const data = { type: p.type, name: p.name, label: p.lbl, groupNames: [], tags: [] };
        const r = await api.addOrUpdateItem(p.name, data);
        logOK("addOrUpdateItem → " + JSON.stringify(r));
      }
    },
    { name: "addOrUpdateItems", params: [],
      fn: async () => {
        const api = new openHAB.Items(client);
        const items = [{ type: "Switch", name: "bulkSwitch1", label: "Bulk 1" }];
        const r = await api.addOrUpdateItems(items);
        logOK("addOrUpdateItems → " + JSON.stringify(r));
      }
    },
    { name: "addTag", params: [
        { label: "itemName", key: "name", def: "testSwitch" },
        { label: "tag",      key: "tag",  def: "Lighting" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.addTag(p.name, p.tag);
        logOK("addTag → " + JSON.stringify(r));
      }
    },
    { name: "removeTag", params: [
        { label: "itemName", key: "name", def: "testSwitch" },
        { label: "tag",      key: "tag",  def: "Lighting" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);
        const r = await api.removeTag(p.name, p.tag);
        logOK("removeTag → " + JSON.stringify(r));
      }
    },
    { name: "addMetadata", params: [
        { label: "itemName",  key: "name", def: "testSwitch" },
        { label: "namespace", key: "ns",   def: "exampleNamespace" },
        { label: "value",     key: "val",  def: "metadata_value" },
      ],
      fn: async (p) => {
        const api = new openHAB.Items(client);

// ─── Sidebar builder ──────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";

  const sections = [
    { header: "REST APIs", keys: Object.keys(SECTIONS) },
    { header: "SSE Streams", keys: Object.keys(SSE_SECTIONS) },
  ];

  for (const { header, keys } of sections) {
    const h = document.createElement("div");
    h.className = "nav-section";
    h.textContent = header;
    nav.appendChild(h);

    for (const key of keys) {
      const s = SECTIONS[key] || SSE_SECTIONS[key];
      const item = document.createElement("div");
      item.className = "nav-item";
      item.dataset.key = key;
      item.dataset.type = SECTIONS[key] ? "rest" : "sse";
      item.innerHTML = `<span>${s.title}</span><span class="badge">${s.tests.length}</span>`;
      item.onclick = () => loadSection(key, item.dataset.type);
      nav.appendChild(item);
    }
  }
}

// ─── Section loader ───────────────────────────────────────────────────────────
function loadSection(key, type) {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.querySelector(`.nav-item[data-key="${key}"]`)?.classList.add("active");

  const s = type === "rest" ? SECTIONS[key] : SSE_SECTIONS[key];
  currentSection = key;
  resetStats();

  document.getElementById("panel-title").textContent = s.title;
  document.getElementById("panel-sub").textContent   = s.sub;

  const list = document.getElementById("test-list");
  list.innerHTML = "";

  const isSSE = type === "sse";

  s.tests.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "test-card";

    // Render params
    const paramFields = (t.params || []).map(p =>
      `<div class="param-group">
        <label class="param-label">${p.label}</label>
        <input class="param-input" data-key="${p.key}" value="${p.def}" placeholder="${p.def}">
      </div>`
    ).join("");

    const btnColor = isSSE ? "blue" : "green";
    const btnLabel = isSSE ? "▶ Stream" : "▶ Run";

    card.innerHTML = `
      <div class="test-card-head" onclick="toggleParams(this)">
        <span class="test-num">#${i + 1}</span>
        <span class="test-name">${t.name}</span>
        <span class="test-state"></span>
      </div>
      <div class="test-params ${t.params?.length ? '' : 'open'}">
        ${paramFields}
        <button class="btn ${btnColor} run-btn" style="margin-left:auto;">${btnLabel}</button>
      </div>`;

    // Wire run button
    const runBtn = card.querySelector(".btn.run-btn");
    const head   = card.querySelector(".test-card-head");
    if (!t.params?.length) card.querySelector(".test-params").style.display = "flex";

    const execFn = async () => {
      if (!client) { logERR("Nicht verbunden! Zuerst verbinden."); return; }
      const params = {};
      card.querySelectorAll(".param-input").forEach(inp => { params[inp.dataset.key] = inp.value; });
      await runTest(head, () => t.fn(params), t.name, i + 1);
    };

    runBtn.addEventListener("click", e => { e.stopPropagation(); execFn(); });

    list.appendChild(card);
  });

  clearLog();
  logINFO(`Abschnitt "${s.title}" geladen — ${s.tests.length} Tests`);
  if (isSSE) logSSE("⚡ SSE-Tests öffnen einen Livestream im Monitor (rechts unten). Stopp mit ■ Stop.");
}

function toggleParams(head) {
  const params = head.nextElementSibling;
  params.classList.toggle("open");
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildNav();
logINFO("js-openhab-rest-client Testsuite bereit.");
logINFO("1. openHAB-URL + Zugangsdaten eingeben → Verbinden klicken");
logINFO("2. Klasse in der Seitenleiste wählen");
logINFO("3. Einzelne Tests oder alle per ▶ Alle Tests ausführen");
